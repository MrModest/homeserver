---
- name: Start 'planka'
  ansible.builtin.import_tasks: tasks/compose_up.yml
  vars:
    t_app_name: 'planka'
    t_app_data_dirs:
      - '{{ p_dirs.apps_data }}/planka/db'
      - '{{ p_dirs.apps_data }}/planka/data'
      - '{{ p_dirs.apps_data }}/planka/data/protected'
      - '{{ p_dirs.apps_data }}/planka/data/private'
      - '{{ p_dirs.apps_data }}/planka/data/logs'
